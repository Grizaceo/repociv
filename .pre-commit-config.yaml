# See https://pre-commit.com for more info
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: prettier
        name: Prettier (format TS/CSS)
        entry: npx prettier --write
        language: system
        files: ^src/.*\.(ts|tsx|css)$
        pass_filenames: true
        require_serial: true

      - id: eslint
        name: ESLint (check TS)
        entry: npx eslint --max-warnings=0
        language: system
        files: ^src/.*\.(ts|tsx)$
        pass_filenames: true
        require_serial: true

      - id: vitest
        name: Vitest (unit tests)
        entry: npm test -- --run
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true

      - id: tsc
        name: TypeScript type check
        entry: npx tsc --noEmit
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true

      - id: pytest
        name: pytest (Python tests)
        entry: bash -c 'source .venv/bin/activate && pytest --tb=short -q'
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true
