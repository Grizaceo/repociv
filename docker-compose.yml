# ─── RepoCiv — Docker Compose ─────────────────────────────────────────────────
# Runs bridge (Python) and frontend (Node/static) as separate services.
#
# Usage:
#   docker compose up --build
#   docker compose up --build -d   # detached
#   docker compose down
#
# Access:
#   Frontend:  http://localhost:5273
#   Bridge:    http://localhost:5274

services:
  bridge:
    build:
      context: .
      target: bridge
    ports:
      - "${BRIDGE_PORT:-5274}:5274"
    env_file:
      - path: .env
        required: false
    environment:
      BRIDGE_PORT: "5274"
      REPOCIV_PORT: "${REPOCIV_PORT:-5273}"
    volumes:
      # Mount workspace so the bridge can see real repos
      - "${HERMES_ROOT:-~/.hermes}:/root/.hermes:ro"
      # Persist event log and session state
      - repociv-data:/root/.repociv
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5274/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      target: static
    ports:
      - "${REPOCIV_PORT:-5273}:80"
    depends_on:
      bridge:
        condition: service_healthy
    restart: unless-stopped

volumes:
  repociv-data:
